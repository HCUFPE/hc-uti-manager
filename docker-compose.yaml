version: "3.9"

services:
  backend:
    build:
      context: .
    container_name: hc-uti-backend
    env_file: .env
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    ports:
      - "8080:8000"
    volumes:
      # Mounts granulares do Python para hot-reload, SEM sobrescrever src/static/dist.
      # O dist compilado pelo Dockerfile é sempre preservado dentro da imagem.
      # Para atualizar o frontend na porta 8080, execute: podman-compose up --build
      - ./src/main.py:/app/src/main.py
      - ./src/dependencies.py:/app/src/dependencies.py
      - ./src/auth:/app/src/auth
      - ./src/controllers:/app/src/controllers
      - ./src/providers:/app/src/providers
      - ./src/routers:/app/src/routers
      - ./src/models:/app/src/models
      - ./src/resources:/app/src/resources
      - ./src/helpers:/app/src/helpers
      - ./data:/app/data
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      target: frontend-dev
    container_name: hc-uti-frontend
    working_dir: /app/frontend
    volumes:
      - ./frontend:/app/frontend
    command: ["sh", "-c", "npm install && npm run dev -- --host 0.0.0.0"]
    ports:
      - "5173:5173"

  postgres:
    image: postgres:15
    container_name: hc-uti-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: hcmanager
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"

volumes:
  pgdata:
