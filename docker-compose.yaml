version: "3.9"

services:
  backend:
    build:
      context: .
      # Garante que o build use a etapa final do Dockerfile (produção)
    container_name: hc-uti-backend
    env_file: .env
    # Sem --reload para maior estabilidade e performance em produção
    command: ["uvicorn", "src.main:app", "--host", "0.0.0.0", "--port", "8000"]
    expose:
      - "8000"
    volumes:
      # Mantemos apenas o volume de dados (banco SQLite e logs)
      - ./data:/app/data
    restart: always

  nginx:
    image: nginx:alpine
    container_name: hc-uti-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    restart: always
